<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Green Thumb AI</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="app-container">
        <header class="header">
            <div class="logo">🌿</div>
            <h1>Green Thumb</h1>
            <p>Your Personal Plant Care Botanist</p>
        </header>

        <main class="chat-container" id="chat-container">
            <div class="message assistant">
                <div class="avatar">🌱</div>
                <div class="bubble">
                    Hello! I'm your Green Thumb Assistant. Tell me what plant you need help with! (e.g., "How do I care for my monstera?")
                </div>
            </div>
        </main>

        <div class="input-area">
            <input type="text" id="user-input" placeholder="Type your plant care question..." autocomplete="off">
            <button id="send-btn">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
            </button>
        </div>
    </div>
    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
